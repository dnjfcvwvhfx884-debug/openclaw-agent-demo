<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="style.css"></head>
<body>

<div style="display:flex">
<div class="sidebar">
<a href="/">Dashboard</a>
<a href="/logs.html">Logs</a>
</div>

<div style="padding:20px">
<h1>Logs</h1>
<div id="log" class="card"></div>
</div>
</div>

<script>
let logs=["扫描代码","分析问题","生成PR","完成"];
let i=0;
function run(){
  if(i<logs.length){
    document.getElementById("log").innerHTML+=logs[i]+"<br>";
    i++;
    setTimeout(run,800);
  }
}
run();
</script>

</body>
</html>
