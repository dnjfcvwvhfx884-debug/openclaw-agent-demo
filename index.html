<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>OpenClaw AI Platform</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.diff-add { background:#e6ffed;color:#22863a; }
.diff-del { background:#ffeef0;color:#cb2431; }
.fade { animation: fadeIn 1s ease-in; }
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
</style>
</head>

<body class="bg-gray-900 text-white">

<div class="max-w-5xl mx-auto p-6">

<!-- 标题 -->
<h1 class="text-4xl font-bold mb-2 fade">🚀 OpenClaw AI 重构系统</h1>
<p class="text-gray-400 mb-6 fade">
自动扫描代码 → 生成 PR → 自动测试 → 完整闭环
</p >

<!-- 数据 -->
<div class="grid grid-cols-4 gap-4 mb-6 text-center">
  <div class="bg-gray-800 p-4 rounded">Token<br><b id="token">5000000</b></div>
  <div class="bg-gray-800 p-4 rounded">文件<br><b id="files">150000</b></div>
  <div class="bg-gray-800 p-4 rounded">PR<br><b id="pr">10</b></div>
  <div class="bg-gray-800 p-4 rounded text-green-400">成功率<br><b>100%</b></div>
</div>

<!-- AI思考 -->
<div class="bg-black p-4 rounded mb-6 font-mono text-green-400 h-40 overflow-auto" id="thinking"></div>

<!-- Diff -->
<div class="bg-white text-black p-4 rounded font-mono text-sm" id="diff"></div>

<div class="mt-4 text-green-400 font-semibold" id="result"></div>

</div>

<script>

// AI思考流程
const thoughts = [
"🔍 正在扫描仓库结构...",
"📊 发现技术债：SQL 拼接风险",
"🧠 推理：可能导致 SQL 注入",
"⚙️ 生成安全重构方案",
"🧪 运行测试验证...",
"✅ 测试通过，生成 PR"
];

let t = 0;

function runThinking(){
  if(t < thoughts.length){
    document.getElementById("thinking").innerHTML += thoughts[t] + "<br>";
    t++;
    setTimeout(runThinking, 900);
  } else {
    setTimeout(runDiff, 800);
  }
}

// Diff动画
const diffLines = [
'- return db.query("SELECT name FROM user WHERE id="+id);',
'+ String sql = "SELECT name FROM user WHERE id = ?";',
'+ return db.queryPrepared(sql, id);'
];

let d = 0;

function runDiff(){
  function add(){
    if(d < diffLines.length){
      let line = diffLines[d];
      let div = document.createElement("div");
      div.className = line.startsWith('+') ? 'diff-add' : 'diff-del';
      div.innerText = line;
      document.getElementById("diff").appendChild(div);
      d++;
      setTimeout(add, 700);
    } else {
      document.getElementById("result").innerText =
        "✔ AI已完成重构：修复SQL注入风险（参数化查询）";
      growData();
    }
  }
  add();
}

// 数据增长
function growData(){
  let pr = document.getElementById("pr");
  let val = parseInt(pr.innerText);
  let i=0;
  let timer = setInterval(()=>{
    pr.innerText = val + i;
    i++;
    if(i>5) clearInterval(timer);
  },300);
}

// 自动启动（关键！）
setTimeout(runThinking, 1000);

</script>

</body>
</html>
