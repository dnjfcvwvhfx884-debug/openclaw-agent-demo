<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>OpenClaw AI</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Spinner */
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin-top: 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Progress bar styles */
    .progress-bar-container {
      width: 100%;
      height: 20px;
      background-color: #f3f3f3;
      border-radius: 8px;
      margin-top: 20px;
    }

    .progress-bar {
      height: 100%;
      background-color: #3498db;
      border-radius: 8px;
      width: 0%;
      transition: width 0.5s;
    }

    /* AI thinking text */
    .thinking {
      font-style: italic;
      color: #fff;
      font-size: 1.2rem;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="max-w-6xl mx-auto p-6">
    <h1 class="text-5xl font-bold mb-4 fade">🚀 OpenClaw AI</h1>
    <p class="text-xl text-gray-400 mb-6 fade">
      让代码重构从“人工成本”，变成“自动化基础设施”
    </p>

    <!-- Task Control -->
    <div class="card mb-6">
      <button class="btn" onclick="startTasks()">开始自动重构</button>
      <p id="status"></p>

      <!-- Spinner -->
      <div id="spinner" class="spinner" style="display:none;"></div>

      <!-- Progress Bar -->
      <div class="progress-bar-container" style="display:none;">
        <div id="progress" class="progress-bar"></div>
      </div>
      
      <!-- AI Thinking Process -->
      <div id="thinking" class="thinking" style="display:none;"></div>
    </div>

    <!-- Logs -->
    <div id="log" class="card"></div>
  </div>

  <script>
    // Simulate API request
    function fakeAPI(taskName) {
      return new Promise(resolve => {
        setTimeout(() => {
          resolve(`${taskName} completed`);
        }, Math.random() * 2000 + 1000);  // Random delay between 1 to 3 seconds
      });
    }

    // Simulate AI thinking process
    function simulateThinking() {
      let thinkingTexts = [
        "AI 正在扫描代码库...",
        "AI 正在分析代码结构...",
        "AI 正在识别潜在问题...",
        "AI 正在生成 PR...",
        "AI 正在运行自动测试...",
        "AI 重构任务完成！"
      ];
      let i = 0;
      let thinkingElement = document.getElementById("thinking");
      thinkingElement.style.display = "block"; // Show thinking process

      function displayThinkingText() {
        if (i < thinkingTexts.length) {
          thinkingElement.innerText = thinkingTexts[i];
          i++;
          setTimeout(displayThinkingText, 2000); // Update every 2 seconds
        }
      }

      displayThinkingText();
    }

    // Start tasks (triggered by button click)
    async function startTasks() {
      document.getElementById("status").innerText = "Running tasks...";
      document.getElementById("spinner").style.display = "block";  // Show spinner
      document.getElementById("progress-bar-container").style.display = "block";  // Show progress bar
      document.getElementById("progress").style.width = "0%"; // Start from 0%

      // Start thinking animation
      simulateThinking();

      // Start multiple tasks concurrently
      const tasks = [
        fakeAPI('扫描代码库'),
        fakeAPI('分析代码'),
        fakeAPI('生成 PR'),
        fakeAPI('运行测试')
      ];

      let progress = 0;
      const updateProgress = setInterval(() => {
        progress += 25;
        document.getElementById("progress").style.width = `${progress}%`;
        if (progress >= 100) clearInterval(updateProgress);  // Stop when it reaches 100%
      }, 1000);

      const results = await Promise.all(tasks);  // Wait for all tasks to finish

      // Once tasks are completed, update status
      document.getElementById("status").innerText = results.join("\n");
      document.getElementById("spinner").style.display = "none";  // Hide spinner
      document.getElementById("thinking").style.display = "none";  // Hide thinking text
      logResults(results);
    }

    // Display task logs
    function logResults(results) {
      let logText = '';
      results.forEach(result => {
        logText += `<div>${result}</div>`;
      });
      document.getElementById("log").innerHTML = logText;
    }
  </script>
</body>
</html>
