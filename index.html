<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>OpenClaw Agent Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-6xl mx-auto p-6">

  <!-- 标题 -->
  <h1 class="text-3xl font-bold mb-2">🚀 OpenClaw 自动化重构 Agent</h1>
  <p class="text-gray-500 mb-6">项目编号：OC-AGENT-REFAC-2025-001</p >

  <!-- 指标卡片 -->
  <div class="grid grid-cols-4 gap-4 mb-8">
    <div class="bg-white p-4 rounded shadow hover:scale-105 transition">
      <p class="text-sm text-gray-500">日均 Token</p >
      <p class="text-xl font-bold">5,000,000</p >
    </div>
    <div class="bg-white p-4 rounded shadow hover:scale-105 transition">
      <p class="text-sm text-gray-500">扫描文件</p >
      <p class="text-xl font-bold">152,342</p >
    </div>
    <div class="bg-white p-4 rounded shadow hover:scale-105 transition">
      <p class="text-sm text-gray-500">生成 PR</p >
      <p class="text-xl font-bold">12 / 天</p >
    </div>
    <div class="bg-white p-4 rounded shadow hover:scale-105 transition">
      <p class="text-sm text-gray-500">效率提升</p >
      <p class="text-xl font-bold text-green-600">+80%</p >
    </div>
  </div>

  <!-- 图表 -->
  <div class="grid grid-cols-2 gap-6 mb-8">
    <div class="bg-white p-4 rounded shadow">
      <h2 class="mb-2 font-semibold">Token 使用趋势</h2>
      <canvas id="lineChart"></canvas>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <h2 class="mb-2 font-semibold">问题类型分布</h2>
      <canvas id="pieChart"></canvas>
    </div>
  </div>

  <!-- 工作流 -->
  <div class="bg-white p-6 rounded shadow mb-8">
    <h2 class="text-xl font-semibold mb-4">Agent 工作流</h2>
    <div class="flex justify-between items-center text-center">
      <div class="animate-pulse">代码扫描</div>
      <div>→</div>
      <div class="animate-pulse">规范分析</div>
      <div>→</div>
      <div class="animate-pulse">生成 PR</div>
      <div>→</div>
      <div class="animate-pulse">自动测试</div>
      <div>→</div>
      <div class="animate-pulse">结果反馈</div>
    </div>
  </div>

  <!-- 日志 -->
  <div class="bg-black text-green-400 p-4 rounded font-mono text-sm h-40 overflow-hidden">
    <div id="log"></div>
  </div>

</div>

<script>
// 动态日志动画
const logs = [
  "[INFO] Agent Started",
  "[INFO] Scanning repository...",
  "[INFO] Issues found: 342",
  "[INFO] Generating PR...",
  "[INFO] Running tests...",
  "[INFO] All tests passed ✔"
];

let i = 0;
function addLog() {
  if (i < logs.length) {
    document.getElementById("log").innerHTML += logs[i] + "<br>";
    i++;
    setTimeout(addLog, 800);
  }
}
addLog();

// 折线图
new Chart(document.getElementById('lineChart'), {
  type: 'line',
  data: {
    labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
    datasets: [{
      label: 'Token 使用量',
      data: [300,500,800,1200,1800,2200,2600],
      borderWidth: 2
    }]
  }
});

// 饼图
new Chart(document.getElementById('pieChart'), {
  type: 'pie',
  data: {
    labels: ['代码规范','性能优化','架构问题','安全问题'],
    datasets: [{
      data: [45,25,20,10]
    }]
  }
});
</script>

</body>
</html>
