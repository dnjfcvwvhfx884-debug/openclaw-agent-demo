<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>OpenClaw AI Platform</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.fade { animation: fadeIn 1s ease-in; }
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
.diff-add { background:#e6ffed;color:#22863a; }
.diff-del { background:#ffeef0;color:#cb2431; }
</style>
</head>

<body class="bg-gray-900 text-white">

<div class="max-w-6xl mx-auto p-6">

<!-- HERO -->
<h1 class="text-4xl font-bold mb-2 fade">
🚀 OpenClaw AI 自动代码重构平台
</h1>
<p class="text-gray-400 mb-6 fade">
让 AI 自动扫描技术债 → 生成 PR → 自动测试 → 持续优化代码质量
</p>

<!-- KPI -->
<div class="grid grid-cols-4 gap-4 mb-8 text-center">
  <div class="bg-gray-800 p-4 rounded">
    日均Token<br><b id="token">5,000,000</b>
  </div>
  <div class="bg-gray-800 p-4 rounded">
    覆盖代码量<br><b>150万行+</b>
  </div>
  <div class="bg-gray-800 p-4 rounded">
    团队规模<br><b>20人</b>
  </div>
  <div class="bg-gray-800 p-4 rounded text-green-400">
    效率提升<br><b>+80%</b>
  </div>
</div>

<!-- AI DEMO -->
<div class="bg-black p-4 rounded mb-6 font-mono text-green-400 h-40 overflow-auto" id="thinking"></div>

<div class="bg-white text-black p-4 rounded font-mono text-sm" id="diff"></div>

<div class="mt-4 text-green-400 font-semibold" id="result"></div>

<!-- 商业模式 -->
<div class="mt-10">
<h2 class="text-2xl font-bold mb-4">💰 商业模式</h2>

<div class="grid grid-cols-3 gap-4 text-center">
  <div class="bg-gray-800 p-4 rounded">
    按Token收费<br><b>$0.002 / 1K Token</b>
  </div>
  <div class="bg-gray-800 p-4 rounded">
    按仓库订阅<br><b>$49 / repo / 月</b>
  </div>
  <div class="bg-gray-800 p-4 rounded">
    企业私有部署<br><b>$10K / 年</b>
  </div>
</div>
</div>

<!-- 增长 -->
<div class="mt-10">
<h2 class="text-2xl font-bold mb-4">📈 增长潜力</h2>
<p class="text-gray-400">
开发者工具市场 + AI工程化正在爆发，代码自动化重构将成为标配。
未来可扩展至自动修复、自动Review、自动测试生成等方向。
</p>
</div>

</div>

<script>

// AI思考
const thoughts = [
"扫描代码仓库...",
"检测技术债...",
"发现SQL注入风险",
"生成重构方案",
"运行测试...",
"测试通过，生成PR"
];

let t=0;
function runThinking(){
  if(t<thoughts.length){
    document.getElementById("thinking").innerHTML += thoughts[t]+"<br>";
    t++;
    setTimeout(runThinking,800);
  } else {
    setTimeout(runDiff,800);
  }
}

// Diff
const diffLines = [
'- return db.query("SELECT name FROM user WHERE id="+id);',
'+ String sql = "SELECT name FROM user WHERE id = ?";',
'+ return db.queryPrepared(sql, id);'
];

let d=0;
function runDiff(){
  function add(){
    if(d<diffLines.length){
      let line=diffLines[d];
      let div=document.createElement("div");
      div.className=line.startsWith('+')?'diff-add':'diff-del';
      div.innerText=line;
      document.getElementById("diff").appendChild(div);
      d++;
      setTimeout(add,600);
    } else {
      document.getElementById("result").innerText =
      "✔ AI完成重构：修复SQL注入风险";
    }
  }
  add();
}

// 自动播放
setTimeout(runThinking,1000);

</script>

</body>
</html>
