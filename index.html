<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>OpenClaw AI Refactor System</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.diff-add { background:#e6ffed;color:#22863a; }
.diff-del { background:#ffeef0;color:#cb2431; }
.blink { animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0; } }
</style>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

<!-- Sidebar -->
<div class="w-64 bg-black text-white p-4">
  <h2 class="text-xl font-bold mb-6">OpenClaw AI</h2>
  <ul>
    <li onclick="showPage('dashboard')" class="mb-3 cursor-pointer">📊 Dashboard</li>
    <li onclick="showPage('ai')" class="mb-3 cursor-pointer">🧠 AI Engine</li>
    <li onclick="showPage('diff')" class="mb-3 cursor-pointer">🔍 PR Diff</li>
  </ul>
</div>

<!-- Main -->
<div class="flex-1 p-6">

<!-- Dashboard -->
<div id="dashboard">
<h1 class="text-2xl font-bold mb-4">🚀 系统总览</h1>

<div class="grid grid-cols-4 gap-4 mb-6">
  <div class="bg-white p-4 rounded shadow">
    Token<br><b id="token">5,000,000</b>
  </div>
  <div class="bg-white p-4 rounded shadow">
    扫描文件<br><b id="files">152,342</b>
  </div>
  <div class="bg-white p-4 rounded shadow">
    PR 数量<br><b id="prCount">12</b>
  </div>
  <div class="bg-white p-4 rounded shadow text-green-600">
    成功率<br><b>100%</b>
  </div>
</div>

<button onclick="startDemo()" class="bg-black text-white px-4 py-2 rounded">
▶ 开始自动重构演示
</button>

</div>

<!-- AI Engine -->
<div id="ai" class="hidden">
<h1 class="text-2xl font-bold mb-4">🧠 AI 正在分析代码</h1>

<div class="bg-black text-green-400 p-4 font-mono h-64" id="aiLog">
<span class="blink">▋</span>
</div>
</div>

<!-- Diff -->
<div id="diff" class="hidden">
<h1 class="text-2xl font-bold mb-4">🔍 自动生成 PR Diff</h1>

<div class="bg-white p-4 rounded shadow font-mono text-sm" id="diffBox"></div>

<div class="mt-4 text-green-600 font-semibold" id="diffExplain"></div>
</div>

</div>
</div>

<script>

// 页面切换
function showPage(p){
  ['dashboard','ai','diff'].forEach(id=>{
    document.getElementById(id).classList.add('hidden');
  });
  document.getElementById(p).classList.remove('hidden');
}

// AI日志流
const aiSteps = [
"加载代码仓库...",
"扫描文件结构...",
"检测代码异味...",
"发现 SQL 拼接风险...",
"分析优化方案...",
"生成重构代码..."
];

let step = 0;

function runAI(){
  if(step < aiSteps.length){
    document.getElementById("aiLog").innerHTML += aiSteps[step] + "<br>";
    step++;
    setTimeout(runAI, 800);
  } else {
    setTimeout(showDiff, 1000);
  }
}

// Diff逐行生成
const diffLines = [
'- return db.query("SELECT name FROM user WHERE id="+id);',
'+ String sql = "SELECT name FROM user WHERE id = ?";',
'+ return db.queryPrepared(sql, id);'
];

let d = 0;

function showDiff(){
  showPage('diff');
  function addLine(){
    if(d < diffLines.length){
      let line = diffLines[d];
      let div = document.createElement("div");
      div.className = line.startsWith('+') ? 'diff-add' : 'diff-del';
      div.innerText = line;
      document.getElementById("diffBox").appendChild(div);
      d++;
      setTimeout(addLine, 700);
    } else {
      document.getElementById("diffExplain").innerText =
        "✔ AI自动修复 SQL 注入风险，使用参数化查询";
      increaseMetrics();
    }
  }
  addLine();
}

// 数据增长动画
function increaseMetrics(){
  let pr = document.getElementById("prCount");
  let count = parseInt(pr.innerText);
  let i = 0;
  let timer = setInterval(()=>{
    pr.innerText = count + i;
    i++;
    if(i>3) clearInterval(timer);
  },300);
}

// 一键启动
function startDemo(){
  showPage('ai');
  document.getElementById("aiLog").innerHTML="";
  step=0;
  d=0;
  runAI();
}

</script>

</body>
</html>
